name: CI

# Phase-0 CI gate: lint + unit/golden tests for the Python backend, the
# strict-TypeScript production build for the frontend, and a single-runner
# performance-budget pass. See backend/tests/test_perf.py for the budgets.

on:
  push:
    branches: [main]
  pull_request:

# A new push to a branch cancels the previous, still-running CI for that branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install (editable + dev/api/test extras)
        run: pip install -e ".[dev,api,test]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (golden + unit; live and perf excluded)
        run: pytest -m "not live and not perf" -q

  perf:
    name: perf budgets
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install (editable + dev/api/test extras)
        run: pip install -e ".[dev,api,test]"

      # -s surfaces the per-benchmark budget report in the job log.
      - name: Performance budgets
        run: pytest -m perf -q -s

  frontend:
    name: frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: Build (strict TypeScript + Vite)
        run: npm run build
